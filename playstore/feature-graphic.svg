<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <radialGradient id="bg" cx="30%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1e0f4e"/>
      <stop offset="100%" stop-color="#060412"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5c842" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f5c842" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonBody" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="60%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="tagline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f5c842"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- 별들 -->
  <circle cx="50" cy="60" r="2" fill="white" opacity="0.5"/>
  <circle cx="120" cy="30" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="200" cy="80" r="1" fill="white" opacity="0.4"/>
  <circle cx="800" cy="40" r="2" fill="white" opacity="0.5"/>
  <circle cx="900" cy="80" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="960" cy="30" r="1" fill="white" opacity="0.4"/>
  <circle cx="700" cy="450" r="2" fill="white" opacity="0.5"/>
  <circle cx="850" cy="420" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="150" cy="400" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="80" cy="350" r="1" fill="white" opacity="0.5"/>
  <circle cx="980" cy="380" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="450" cy="30" r="1" fill="white" opacity="0.4"/>
  <circle cx="600" cy="470" r="1.5" fill="white" opacity="0.3"/>

  <!-- 달 글로우 -->
  <circle cx="820" cy="250" r="180" fill="url(#moonGlow)" filter="url(#glow)"/>

  <!-- 달 본체 -->
  <circle cx="820" cy="250" r="130" fill="url(#moonBody)"/>
  <!-- 달 어두운 면 -->
  <circle cx="865" cy="230" r="115" fill="#070315"/>

  <!-- 왼쪽 텍스트 영역 -->
  <!-- 작은 태그 -->
  <rect x="80" y="140" width="200" height="32" rx="16" fill="#2d1b69" opacity="0.8"/>
  <text x="180" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a78bfa" letter-spacing="3">AI 꿈 해몽 앱</text>

  <!-- 메인 타이틀 -->
  <text x="80" y="240" font-family="Georgia, serif" font-size="88" font-weight="bold" fill="white" filter="url(#textGlow)">Rea<tspan fill="#f5c842">D</tspan>ream</text>

  <!-- 서브타이틀 -->
  <text x="82" y="290" font-family="Arial, sans-serif" font-size="26" fill="#c4b5fd" letter-spacing="1">꿈이 전하는 내면의 메시지</text>

  <!-- 구분선 -->
  <line x1="80" y1="315" x2="380" y2="315" stroke="url(#tagline)" stroke-width="1.5" opacity="0.6"/>

  <!-- 특징 설명 -->
  <text x="80" y="355" font-family="Arial, sans-serif" font-size="20" fill="#e2d9f3" opacity="0.9">✦  융 분석심리학 기반 AI 해몽</text>
  <text x="80" y="385" font-family="Arial, sans-serif" font-size="20" fill="#e2d9f3" opacity="0.9">✦  상징 분석 · 전체 해석 · 오늘의 조언</text>
  <text x="80" y="415" font-family="Arial, sans-serif" font-size="20" fill="#e2d9f3" opacity="0.9">✦  꿈 일기 저장 · 카카오톡 공유</text>
</svg>
