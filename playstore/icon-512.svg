<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0a0618"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5c842" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f5c842" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonBody" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="60%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- 별들 -->
  <circle cx="80" cy="80" r="2" fill="white" opacity="0.6"/>
  <circle cx="150" cy="50" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="420" cy="90" r="2" fill="white" opacity="0.7"/>
  <circle cx="460" cy="140" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="60" cy="200" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="440" cy="320" r="2" fill="white" opacity="0.6"/>
  <circle cx="100" cy="380" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="380" cy="420" r="2" fill="white" opacity="0.5"/>
  <circle cx="200" cy="460" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="320" cy="70" r="1" fill="white" opacity="0.6"/>

  <!-- 달 글로우 -->
  <circle cx="256" cy="220" r="130" fill="url(#moonGlow)" filter="url(#glow)"/>

  <!-- 달 본체 -->
  <circle cx="256" cy="220" r="100" fill="url(#moonBody)" filter="url(#softGlow)"/>

  <!-- 달의 어두운 부분 (초승달 효과) -->
  <circle cx="296" cy="205" r="88" fill="#0d0825"/>

  <!-- 텍스트: ReaDream -->
  <text x="256" y="390" text-anchor="middle" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="white" letter-spacing="2">
    Rea<tspan fill="#f5c842">D</tspan>ream
  </text>

  <!-- 텍스트: AI 꿈 해몽 -->
  <text x="256" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#a78bfa" letter-spacing="4">AI 꿈 해몽</text>

  <!-- 하단 장식선 -->
  <line x1="156" y1="447" x2="356" y2="447" stroke="#4c1d95" stroke-width="1" opacity="0.6"/>
</svg>
