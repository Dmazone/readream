name: Build TWA AAB for Play Store

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools"

      - name: Install Inkscape (SVG → PNG)
        run: sudo apt-get install -y inkscape

      - name: Convert SVG icons to PNG
        run: |
          inkscape --export-type=png --export-width=512 --export-height=512 \
            --export-filename=public/icon-512.png playstore/icon-512.svg
          inkscape --export-type=png --export-width=192 --export-height=192 \
            --export-filename=public/icon-192.png playstore/icon-512.svg
          mkdir -p public/screenshots
          cp playstore/screenshots/*.png public/screenshots/

      - name: Install bubblewrap
        run: npm install -g @bubblewrap/cli@1.24.1

      - name: Configure bubblewrap (non-interactive)
        run: |
          mkdir -p ~/.bubblewrap
          echo '{
            "jdkPath": "'"$JAVA_HOME"'",
            "androidSdkPath": "'"$ANDROID_SDK_ROOT"'"
          }' > ~/.bubblewrap/config.json

      - name: Restore keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > readream.keystore

      - name: Init TWA project
        run: |
          bubblewrap init \
            --manifest "https://dmazone.github.io/readream/manifest.json" \
            --directory ./twa-app \
            --packageId com.dmazone.readream \
            --name "ReaDream - AI 꿈 해몽" \
            --launcherName "ReaDream" \
            --display standalone \
            --orientation default \
            --themeColor "#1a0533" \
            --navigationColor "#1a0533" \
            --backgroundColor "#0a0118" \
            --startUrl "/readream/" \
            --iconUrl "https://dmazone.github.io/readream/icon-512.png" \
            --maskableIconUrl "https://dmazone.github.io/readream/icon-512.png" \
            --appVersion "1.0.0" \
            --appVersionCode 1 \
            --signingKeyPath "../readream.keystore" \
            --signingKeyAlias readream \
            --minSdkVersion 21 \
            --targetSdkVersion 34 \
            --skipPwaValidation
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Build AAB
        working-directory: ./twa-app
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          bubblewrap build \
            --signingKeyPath ../readream.keystore \
            --signingKeyAlias readream \
            --signingKeyStorePassword "$KEYSTORE_PASSWORD" \
            --signingKeyPassword "$KEY_PASSWORD"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: readream-release-aab
          path: twa-app/app-release-bundle.aab
          retention-days: 30

      - name: Upload signed APK (optional)
        uses: actions/upload-artifact@v4
        with:
          name: readream-release-apk
          path: twa-app/app-release-signed.apk
          retention-days: 30
          if-no-files-found: ignore
