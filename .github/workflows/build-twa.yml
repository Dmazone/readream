name: Build TWA AAB for Play Store

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools"

      - name: Install Inkscape (SVG Ôćĺ PNG)
        run: sudo apt-get install -y inkscape

      - name: Convert SVG icons to PNG (multiple densities)
        run: |
          # mipmap PNGs for legacy devices
          for size in 48 72 96 144 192; do
            case $size in
              48)  density="mdpi"    ;;
              72)  density="hdpi"    ;;
              96)  density="xhdpi"   ;;
              144) density="xxhdpi"  ;;
              192) density="xxxhdpi" ;;
            esac
            mkdir -p twa-project/app/src/main/res/mipmap-${density}
            inkscape --export-type=png --export-width=$size --export-height=$size \
              --export-filename=twa-project/app/src/main/res/mipmap-${density}/ic_launcher.png \
              playstore/icon-512.svg
            cp twa-project/app/src/main/res/mipmap-${density}/ic_launcher.png \
               twa-project/app/src/main/res/mipmap-${density}/ic_launcher_round.png
          done

          # public/ ÝĆ┤ŰŹö ýĽäýŁ┤ýŻś (PWA manifestýÜę)
          inkscape --export-type=png --export-width=512 --export-height=512 \
            --export-filename=public/icon-512.png playstore/icon-512.svg
          inkscape --export-type=png --export-width=192 --export-height=192 \
            --export-filename=public/icon-192.png playstore/icon-512.svg
          mkdir -p public/screenshots
          cp playstore/screenshots/*.png public/screenshots/

      - name: Restore keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > readream.keystore

      - name: Build AAB
        working-directory: ./twa-project
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          gradle :app:bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: readream-release-aab
          path: twa-project/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
