<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta name="keywords" content="꿈해몽, AI 꿈해몽, 꿈 분석, 꿈 상징, 오늘의 꿈, 달빛 해몽, ReaDream">

  <meta property="og:title" content="ReaDream | AI 꿈 해몽">

  <meta name="twitter:description" content="AI가 당신의 꿈을 융 심리학으로 해석해드려요. 지금 무료로 해몽을 받아보세요 🌙">

  <link rel="canonical" href="https://dmazone.github.io/readream/">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* === 기본 리셋 === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:        #0c0720;
      --purple-dark:    #1e0a3c;
      --purple-mid:     #6d28d9;
      --purple-light:   #8b5cf6;
      --indigo:         #4f46e5;
      --gold:           #f59e0b;
      --gold-light:     #fcd34d;
      --text-primary:   #ede0ff;
      --text-secondary: #c4b5fd;
      --text-muted:     #7c7a9a;
      --card-bg:        rgba(109, 40, 217, 0.12);
      --card-border:    rgba(196, 181, 253, 0.18);
      --glass:          rgba(255, 255, 255, 0.035);
      --glass-border:   rgba(255, 255, 255, 0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* ===== 캔버스 배경 ===== */
    #starCanvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    /* ===== 레이아웃 ===== */
    .container {
      position: relative; z-index: 1;
      max-width: 480px; margin: 0 auto; padding: 0 16px 48px;
    }

    /* ===== 헤더 ===== */
    .header { text-align: center; padding: 52px 0 36px; }

    .header-moon {
      font-size: 52px; display: block; margin-bottom: 14px;
      animation: moonGlow 3.5s ease-in-out infinite;
    }

    @keyframes moonGlow {
      0%, 100% { filter: drop-shadow(0 0 18px rgba(245,158,11,0.55)) drop-shadow(0 0 40px rgba(139,92,246,0.2)); }
      50%       { filter: drop-shadow(0 0 32px rgba(245,158,11,0.9))  drop-shadow(0 0 60px rgba(139,92,246,0.35)); }
    }

    .header h1 {
      font-size: 30px; font-weight: 700;
      background: linear-gradient(135deg, #fcd34d 20%, #c4b5fd 80%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: 6px; margin-bottom: 10px;
    }

    .header p { font-size: 12px; color: var(--text-secondary); letter-spacing: 2px; opacity: 0.7; }

    /* ===== 유저 바 ===== */
    .user-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-top: 18px; flex-wrap: wrap;
    }

    .btn-login {
      background: rgba(139, 92, 246, 0.12); border: 1px solid rgba(139,92,246,0.3);
      border-radius: 20px; padding: 7px 16px; color: var(--text-secondary);
      font-size: 12px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .btn-login:hover { background: rgba(139,92,246,0.22); }

    .user-pill {
      display: none; align-items: center; gap: 8px;
      background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.25);
      border-radius: 20px; padding: 6px 14px;
    }
    .user-pill.active { display: flex; }
    .user-email-text { font-size: 11px; color: var(--text-secondary); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-logout { background: none; border: none; color: rgba(196,181,253,0.4); font-size: 11px; cursor: pointer; font-family: inherit; padding: 0; transition: color 0.2s; }
    .btn-logout:hover { color: #fca5a5; }

    /* ===== 공통 카드 ===== */
    .card {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 18px; padding: 20px; margin-bottom: 14px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }

    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
      color: var(--text-secondary); text-transform: uppercase; margin-bottom: 12px; opacity: 0.8;
    }

    /* ===== API 키 섹션 (숨김) ===== */
    #apiCard { display: none; }
    .api-toggle { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; -webkit-user-select: none; }
    .api-status { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #ef4444; flex-shrink: 0; transition: background 0.3s, box-shadow 0.3s; }
    .status-dot.active { background: #10b981; box-shadow: 0 0 7px rgba(16,185,129,0.6); }
    .api-chevron { font-size: 18px; color: var(--text-muted); transition: transform 0.3s ease; line-height: 1; }
    .api-chevron.open { transform: rotate(180deg); }
    .api-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
    .api-body.open { max-height: 200px; }
    .input-row { display: flex; gap: 8px; margin-top: 14px; }
    .api-hint { font-size: 11px; color: var(--text-muted); margin-top: 8px; }

    /* ===== 입력 공통 ===== */
    input[type="password"], input[type="text"], textarea {
      width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--card-border);
      border-radius: 12px; padding: 12px 16px; color: var(--text-primary);
      font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus { border-color: var(--purple-light); box-shadow: 0 0 0 3px rgba(139,92,246,0.15); }
    ::placeholder { color: rgba(196,181,253,0.35); }

    /* ===== 버튼 ===== */
    .btn { border: none; border-radius: 12px; padding: 12px 18px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.2s; }
    .btn-key { background: var(--purple-mid); color: #fff; white-space: nowrap; flex-shrink: 0; }
    .btn-key:hover { background: var(--purple-light); transform: translateY(-1px); }

    .btn-interpret {
      width: 100%; margin-top: 14px; padding: 17px; font-size: 15px; letter-spacing: 3px;
      background: linear-gradient(135deg, #5b21b6, #4338ca); color: #fff; border-radius: 14px;
      box-shadow: 0 4px 24px rgba(91,33,182,0.45); position: relative; overflow: hidden;
    }
    .btn-interpret::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent); }
    .btn-interpret:hover:not(.loading) { transform: translateY(-2px); box-shadow: 0 8px 36px rgba(91,33,182,0.65); }
    .btn-interpret.loading { opacity: 0.55; cursor: not-allowed; }

    /* ===== 꿈 텍스트에어리어 ===== */
    .dream-textarea { min-height: 148px; resize: vertical; line-height: 1.75; }
    .char-count { text-align: right; font-size: 11px; color: var(--text-muted); margin-top: 7px; }

    /* ===== 인라인 알림 ===== */
    .dream-notice { display: none; font-size: 13px; text-align: center; padding: 11px 14px; margin-top: 12px; border-radius: 11px; animation: fadeInUp 0.25s ease both; }
    .dream-notice.active { display: block; }
    .dream-notice.info { color: var(--text-secondary); background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.22); }
    .dream-notice.warn { color: var(--gold-light); background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.22); }

    /* ===== 일일 사용 횟수 표시 ===== */
    .usage-bar { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
    .usage-dots { display: flex; gap: 5px; }
    .usage-dot { width: 9px; height: 9px; border-radius: 50%; border: 1.5px solid rgba(196,181,253,0.25); background: transparent; transition: background 0.25s, border-color 0.25s; }
    .usage-dot.filled { background: var(--purple-light); border-color: var(--purple-light); }
    .usage-dot.all-filled { background: #fca5a5; border-color: #fca5a5; }
    .usage-text { font-size: 11px; color: var(--text-muted); }

    /* ===== 일일 한도 초과 모달 ===== */
    .limit-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.72); backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px); z-index: 200;
      align-items: center; justify-content: center;
    }
    .limit-modal-overlay.active { display: flex; }

    .limit-modal {
      background: linear-gradient(145deg, #1e0a3c, #0c0720);
      border: 1px solid rgba(196,181,253,0.2); border-radius: 24px;
      padding: 36px 28px; max-width: 320px; width: calc(100% - 48px);
      text-align: center; animation: fadeInUp 0.35s ease both;
    }
    .limit-modal-icon { font-size: 52px; margin-bottom: 14px; display: block; }
    .limit-modal h3 { font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 10px; line-height: 1.45; }
    .limit-modal p { font-size: 13px; color: var(--text-secondary); line-height: 1.75; margin-bottom: 10px; }
    .limit-reset-time { font-size: 12px; color: var(--gold); margin-bottom: 18px !important; }
    .btn-limit-close {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #5b21b6, #4338ca);
      border: none; border-radius: 13px; color: #fff; font-size: 14px; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: all 0.2s;
    }
    .btn-limit-close:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(91,33,182,0.5); }

    /* ===== Kakao AdFit 영역 ===== */
    .adfit-container { margin: 18px 0; text-align: center; min-height: 50px; display: flex; align-items: center; justify-content: center; }

    /* ===== 로딩 ===== */
    .loading { display: none; flex-direction: column; align-items: center; gap: 18px; padding: 48px 20px; text-align: center; }
    .loading.active { display: flex; }
    .loading-moon { font-size: 44px; display: inline-block; animation: moonSpin 2.2s linear infinite; }
    @keyframes moonSpin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--text-secondary); letter-spacing: 1.5px; }
    .loading-dots::after { content: ''; animation: dots 1.6s steps(4, end) infinite; }
    @keyframes dots { 0% { content: ''; } 33% { content: '.'; } 66% { content: '..'; } 100% { content: '...'; } }

    /* ===== 결과 섹션 ===== */
    .result-section { display: none; animation: fadeInUp 0.55s ease both; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .result-header { text-align: center; padding: 8px 0 20px; }
    .result-header h2 { font-size: 14px; font-weight: 600; color: var(--text-secondary); letter-spacing: 3px; }
    .gold-divider { width: 50px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 12px auto 0; border-radius: 2px; }

    .symbols-label { text-align: center; margin-bottom: 12px; }
    .symbols-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
    .symbol-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 18px 10px 14px; text-align: center; transition: transform 0.2s, box-shadow 0.2s; }
    .symbol-card:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(109,40,217,0.35); }
    .symbol-emoji { font-size: 30px; display: block; margin-bottom: 8px; }
    .symbol-name { font-size: 13px; font-weight: 700; color: var(--gold-light); margin-bottom: 6px; }
    .symbol-meaning { font-size: 10.5px; color: var(--text-secondary); line-height: 1.55; }

    .interpretation-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; margin-bottom: 14px; }
    .interpretation-card p { font-size: 14px; line-height: 1.85; color: var(--text-primary); }

    .advice-card {
      background: linear-gradient(135deg, rgba(245,158,11,0.09) 0%, rgba(79,70,229,0.09) 100%);
      border: 1px solid rgba(245,158,11,0.28); border-radius: 16px; padding: 20px; margin-bottom: 14px;
      position: relative; overflow: hidden;
    }
    .advice-card::before { content: '✦'; position: absolute; bottom: -20px; right: -6px; font-size: 90px; color: rgba(245,158,11,0.04); pointer-events: none; line-height: 1; }
    .advice-label { font-size: 10px; font-weight: 700; letter-spacing: 2.5px; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; }
    .advice-card p { font-size: 14px; line-height: 1.85; color: var(--gold-light); font-style: italic; }

    .btn-save-diary {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 13px; background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.28); border-radius: 13px;
      color: var(--gold-light); font-size: 13px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all 0.2s; margin-top: 4px;
    }
    .btn-save-diary:hover { background: rgba(245,158,11,0.2); transform: translateY(-1px); }

    /* ===== 공유 버튼 ===== */
    .share-section { margin-top: 14px; }
    .share-label { font-size: 10px; font-weight: 700; letter-spacing: 2.5px; color: var(--text-secondary); text-transform: uppercase; opacity: 0.7; margin-bottom: 10px; text-align: center; }

    .btn-share-canvas {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 14px; margin-bottom: 8px;
      background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(196,181,253,0.08));
      border: 1px solid rgba(245,158,11,0.32); border-radius: 14px;
      color: var(--gold-light); font-size: 13px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-share-canvas svg { width: 20px; height: 20px; flex-shrink: 0; }
    .btn-share-canvas:hover { background: linear-gradient(135deg, rgba(245,158,11,0.22), rgba(196,181,253,0.14)); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,158,11,0.25); }

    .share-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn-share {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 7px; padding: 14px 8px 12px; border-radius: 14px;
      font-size: 11px; font-weight: 700; font-family: inherit;
      cursor: pointer; border: none; transition: all 0.2s; letter-spacing: 0.5px;
    }
    .btn-share svg { width: 26px; height: 26px; flex-shrink: 0; }

    .btn-share-kakao  { background: #FEE500; color: #3A1D1D; }
    .btn-share-kakao:hover  { filter: brightness(0.92); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(254,229,0,0.35); }
    .btn-share-x { background: #000; color: #fff; border: 1px solid rgba(255,255,255,0.15); }
    .btn-share-x:hover { background: #111; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,255,255,0.1); }
    .btn-share-insta  { background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: #fff; }
    .btn-share-insta:hover { filter: brightness(1.08); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(220,39,67,0.4); }
    .btn-share-general { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-secondary); }
    .btn-share-general:hover { background: rgba(255,255,255,0.07); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139,92,246,0.25); }

    /* ===== 꿈 일기 ===== */
    .diary-wrapper { margin-top: 6px; }
    .diary-toggle { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; cursor: pointer; user-select: none; -webkit-user-select: none; transition: background 0.2s; }
    .diary-toggle:hover { background: rgba(255,255,255,0.06); }
    .diary-toggle-left { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; }
    .diary-badge { background: var(--purple-mid); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; min-width: 22px; text-align: center; }
    .diary-chevron { font-size: 18px; color: var(--text-muted); transition: transform 0.3s ease; line-height: 1; }
    .diary-chevron.open { transform: rotate(180deg); }
    .diary-list { display: none; padding-top: 8px; }
    .diary-list.open { display: block; }

    .diary-item {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 12px; padding: 14px 38px 14px 16px;
      margin-bottom: 8px; cursor: pointer; transition: background 0.2s; position: relative;
    }
    .diary-item:hover { background: rgba(255,255,255,0.06); }
    .diary-item-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
    .diary-date { font-size: 11px; color: var(--gold); }
    .diary-emojis { font-size: 16px; letter-spacing: 3px; }
    .diary-preview { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .diary-item-delete {
      position: absolute; top: 10px; right: 10px; background: none; border: none;
      color: rgba(196,181,253,0.25); font-size: 15px; cursor: pointer; padding: 4px 6px;
      line-height: 1; transition: color 0.2s, background 0.2s; border-radius: 4px;
    }
    .diary-item-delete:hover { color: #fca5a5; background: rgba(239,68,68,0.08); }

    .diary-item-detail { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--glass-border); }
    .diary-item-detail.open { display: block; animation: fadeInUp 0.2s ease both; }

    .diary-detail-symbols { display: flex; gap: 7px; margin-bottom: 10px; }
    .diary-detail-sym { flex: 1; text-align: center; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 10px; padding: 8px 4px; }
    .diary-detail-sym .d-emoji { font-size: 22px; display: block; margin-bottom: 3px; }
    .diary-detail-sym .d-name { font-size: 10px; color: var(--gold-light); font-weight: 700; }
    .diary-detail-interp { font-size: 12px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 8px; }
    .diary-detail-advice { font-size: 12px; color: var(--gold); font-style: italic; line-height: 1.6; }

    .diary-empty { text-align: center; color: var(--text-muted); font-size: 13px; padding: 24px 0; }

    /* ===== 토스트 ===== */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px);
      background: rgba(30,10,60,0.95); border: 1px solid rgba(196,181,253,0.25);
      color: var(--text-primary); font-size: 13px; padding: 11px 22px;
      border-radius: 50px; z-index: 300; opacity: 0; transition: opacity 0.3s, transform 0.3s;
      white-space: nowrap; max-width: calc(100vw - 48px); text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== 로그인 모달 ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      z-index: 100; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: linear-gradient(180deg, #1a0a34 0%, #0c0720 100%);
      border: 1px solid rgba(196,181,253,0.15); border-radius: 28px 28px 0 0;
      padding: 32px 24px 40px; width: 100%; max-width: 480px;
      animation: slideUp 0.35s ease both;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-close { position: absolute; top: 16px; right: 18px; background: none; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; line-height: 1; padding: 4px; transition: color 0.2s; }
    .modal-close:hover { color: var(--text-primary); }
    .modal-moon { text-align: center; font-size: 36px; margin-bottom: 6px; }

<script>
/* ============================================================
   별 파티클 캔버스
   ============================================================ */
(function initCanvas() {
  const canvas = document.getElementById('starCanvas');
  const ctx    = canvas.getContext('2d');
  let stars    = [];

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

  function makeStar() {
    return { x: Math.random()*canvas.width, y: Math.random()*canvas.height,
             r: Math.random()*1.4+0.2, speed: Math.random()*0.5+0.25, phase: Math.random()*Math.PI*2 };
  }

  function draw(ts) {
    const t = ts / 1000;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      const alpha = 0.25 + 0.65 * Math.abs(Math.sin(t * s.speed + s.phase));
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(218,204,255,${alpha})`; ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  resize();
  stars = Array.from({ length: 130 }, makeStar);
  window.addEventListener('resize', () => { resize(); stars = Array.from({ length: 130 }, makeStar); });
  requestAnimationFrame(draw);
})();


/* ============================================================
   Supabase 초기화
   ============================================================ */
const SUPABASE_URL  = 'https://mbznbrvxgjlvvegrxrzt.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem5icnZ4Z2psdnZlZ3J4cnp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MzI2NDgsImV4cCI6MjA5MjQwODY0OH0.fGIrXWam5PTioO5EB5OgxrPDrQlaPxnI1pC-GJ8mEf8';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);
let currentUser = null;


/* ============================================================
   인증 상태 관리
   ============================================================ */
sb.auth.onAuthStateChange(async (_event, session) => {
  currentUser = session?.user ?? null;
  updateUserUI();
  await renderDiary();
});

function updateUserUI() {
  const btnLogin  = document.getElementById('btnLogin');
  const userPill  = document.getElementById('userPill');
  const emailText = document.getElementById('userEmailText');
  if (currentUser) {
    btnLogin.style.display = 'none';
    userPill.classList.add('active');
    emailText.textContent  = currentUser.email;
  } else {
    btnLogin.style.display = '';
    userPill.classList.remove('active');
  }
}

document.getElementById('btnLogout').addEventListener('click', async () => {
  await sb.auth.signOut();
  showToast('로그아웃됐어요 🌙');
});


/* ============================================================
   로그인 모달
   ============================================================ */
const modalOverlay = document.getElementById('modalOverlay');

document.getElementById('btnLogin').addEventListener('click', () => {
  modalOverlay.classList.add('active');
  document.getElementById('loginEmail').focus();
});
document.getElementById('modalClose').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeModal(); closeLimitModal(); } });

function closeModal() { modalOverlay.classList.remove('active'); clearAuthNotices(); }

document.querySelectorAll('.modal-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const isLogin = tab.dataset.tab === 'login';
    document.getElementById('formLogin').style.display  = isLogin ? '' : 'none';
    document.getElementById('formSignup').style.display = isLogin ? 'none' : '';
    clearAuthNotices();
  });
});

function clearAuthNotices() {
  ['loginNotice', 'signupNotice'].forEach(id => { const el = document.getElementById(id); el.className = 'auth-notice'; el.textContent = ''; });
}

function showAuthNotice(id, msg, type) {
  const el = document.getElementById(id); el.textContent = msg; el.className = `auth-notice ${type}`;
}

document.getElementById('btnDoLogin').addEventListener('click', async () => {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn      = document.getElementById('btnDoLogin');
  if (!email || !password) { showAuthNotice('loginNotice', '이메일과 비밀번호를 입력해주세요.', 'error'); return; }
  btn.disabled = true; btn.textContent = '로그인 중...';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  btn.disabled = false; btn.textContent = '✦ 로그인하기';
  if (error) {
    showAuthNotice('loginNotice', error.message.includes('Invalid login') ? '이메일 또는 비밀번호가 올바르지 않아요.' : '로그인 중 오류가 발생했어요.', 'error');
  } else { closeModal(); showToast('환영해요! 꿈 여행을 시작해요 🌙'); }
});

document.getElementById('btnDoSignup').addEventListener('click', async () => {
  const email    = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const btn      = document.getElementById('btnDoSignup');
  if (!email || !password) { showAuthNotice('signupNotice', '이메일과 비밀번호를 입력해주세요.', 'error'); return; }
  if (password.length < 6)  { showAuthNotice('signupNotice', '비밀번호는 6자 이상이어야 해요.', 'error'); return; }
  btn.disabled = true; btn.textContent = '가입 중...';
  const { data, error } = await sb.auth.signUp({ email, password });
  btn.disabled = false; btn.textContent = '✦ 회원가입하기';
  if (error) {
    showAuthNotice('signupNotice', error.message.includes('already registered') ? '이미 가입된 이메일이에요. 로그인해주세요.' : '가입 중 오류가 발생했어요.', 'error');
  } else if (data.user && !data.session) {
    showAuthNotice('signupNotice', '📧 가입 확인 메일을 보냈어요. 메일함을 확인해주세요!', 'success');
  } else { closeModal(); showToast('가입 완료! 꿈 여행을 시작해요 🌙'); }
});

/* ============================================================
   일일 사용 횟수 제한 (하루 5회, 자정 리셋)
   ============================================================ */
const DAILY_KEY = 'readream_daily_v1';
const DAILY_MAX = 5;

function getTodayStr() { return new Date().toLocaleDateString('ko-KR'); }

function getDailyCount() {
  try {
    const d = JSON.parse(localStorage.getItem(DAILY_KEY));
    if (d && d.date === getTodayStr()) return d.count || 0;
  } catch {}
  return 0;
}

function incrementDailyCount() {
  const count = getDailyCount() + 1;
  localStorage.setItem(DAILY_KEY, JSON.stringify({ date: getTodayStr(), count }));
  updateUsageUI();
}

function isLimitReached() { return getDailyCount() >= DAILY_MAX; }

function updateUsageUI() {
  const count = getDailyCount();
  const full  = count >= DAILY_MAX;
  const dots  = document.getElementById('usageDots');
  const text  = document.getElementById('usageText');
  if (!dots || !text) return;
  dots.innerHTML = Array.from({ length: DAILY_MAX }, (_, i) => {
    const cls = i < count ? (full ? 'usage-dot all-filled' : 'usage-dot filled') : 'usage-dot';
    return `<span class="${cls}"></span>`;
  }).join('');
  text.textContent = `오늘 ${count}/${DAILY_MAX}회`;
  text.style.color = full ? 'rgba(252,165,165,0.7)' : '';
}

function showLimitModal() {
  const now      = new Date();
  const midnight = new Date(now); midnight.setHours(24, 0, 0, 0);
  const diff     = midnight - now;
  const h        = Math.floor(diff / 3600000);
  const m        = Math.floor((diff % 3600000) / 60000);
  document.getElementById('limitResetTime').textContent = `자정까지 ${h}시간 ${m}분 남았어요`;
  document.getElementById('limitModalOverlay').classList.add('active');
}

/* ============================================================
   API 설정 & 모델 선택 (sessionStorage 캐시)
   ============================================================ */
const API_BASE          = 'https://dalbit-haemong.ekaledma.workers.dev';
const MODEL_SESSION_KEY = 'readream_model_v1';
const MODEL_PRIORITY    = [
  'gemini-2.5-flash',
  'gemini-2.0-flash-lite',
  'gemini-1.5-flash',
  'gemini-1.5-flash-8b',
];
const failedModels = new Set();

function pickModel() {
  const cached = sessionStorage.getItem(MODEL_SESSION_KEY);
  if (cached && !failedModels.has(cached)) return cached;
  return MODEL_PRIORITY.find(m => !failedModels.has(m)) || MODEL_PRIORITY[0];
}

function onModelSuccess(model) { sessionStorage.setItem(MODEL_SESSION_KEY, model); }

function onModelFail(model) {
  failedModels.add(model);
  if (sessionStorage.getItem(MODEL_SESSION_KEY) === model) sessionStorage.removeItem(MODEL_SESSION_KEY);
}

/* ============================================================
   Gemini API 호출 & 해몽
   ============================================================ */
const SYSTEM_PROMPT =
  '당신은 융 분석심리학과 프로이트 심리학에 기반한 꿈 해몽 전문가입니다.\n' +
  '사용자가 꿈 내용을 입력하면 반드시 아래 JSON 형식으로만 응답하세요.\n' +
  '다른 텍스트나 마크다운 없이 순수 JSON만 출력하세요:\n' +
  '{\n  "symbols": [\n    {"emoji": "이모지 1개", "name": "상징명", "meaning": "의미 설명"}\n  ],\n' +
  '  "interpretation": "전체 해석 텍스트 (3~4문장)",\n  "advice": "오늘의 조언 (1~2문장)"\n}\n' +
  '항상 한국어로 답변하세요. 따뜻하고 신비로운 톤을 유지하세요.';

let isLoading     = false;
let cooldownTimer = null;
let currentResult = null;

document.getElementById('interpretBtn').addEventListener('click', interpretDream);

function startButtonCooldown() {
  const btn = document.getElementById('interpretBtn');
  let remaining = 60;
  function tick() {
    remaining--;
    if (remaining <= 0) { clearInterval(cooldownTimer); cooldownTimer = null; btn.textContent = '✦ 해몽하기'; btn.classList.remove('loading'); }
    else btn.textContent = `⏳ ${remaining}초 후 해몽 가능`;
  }
  btn.classList.add('loading');
  btn.textContent = `⏳ ${remaining}초 후 해몽 가능`;
  cooldownTimer = setInterval(tick, 1000);
}

async function callApiOnce(dream, model, signal) {
  const res = await fetch(`${API_BASE}/models/${model}:generateContent`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    signal,
    body: JSON.stringify({
      system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
      contents:           [{ parts: [{ text: dream }] }],
      generationConfig:   { maxOutputTokens: 2048, temperature: 0.9 },
    }),
  });

  if (!res.ok) {
    const errData = await res.json().catch(() => ({}));
    const errObj  = new Error(errData?.error?.message || `HTTP_${res.status}`);
    errObj.status = res.status;
    throw errObj;
  }

  const data      = await res.json();
  const candidate = data.candidates?.[0];
  if (!candidate) throw new Error('NO_CANDIDATE');

  const reason = candidate.finishReason;
  if (reason && reason !== 'STOP' && reason !== 'MAX_TOKENS') throw new Error(`FINISH_${reason}`);

  const rawText = candidate.content?.parts?.[0]?.text ?? '';
  /* 마크다운 코드블록 제거 후 JSON 추출 */
  const cleaned = rawText.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
  const jsonMatch = cleaned.match(/\{[\s\S]*\}/);
  return JSON.parse(jsonMatch ? jsonMatch[0] : cleaned);
}

async function interpretDream() {
  if (cooldownTimer) return;
  if (isLoading) { showDreamNotice('해몽 중이니 잠시만 기다리세요 🌙', 'info'); return; }

  const dreamInput = document.getElementById('dreamInput');
  const dream      = dreamInput.value.trim();

  if (dream.length < 20) {
    showDreamNotice('꿈에 대해 좀 더 자세히 써주세요 🌙', 'info');
    dreamInput.focus();
    return;
  }

  if (isLimitReached()) { showLimitModal(); return; }

  hideDreamNotice();
  hideResult();
  isLoading = true;
  showLoading(true);

  const controller = new AbortController();
  const timeoutId  = setTimeout(() => controller.abort(), 30000);

  try {
    const model = pickModel();
    let parsed;

    /* JSON 파싱 실패 시 최대 2회 재시도 */
    for (let attempt = 0; attempt <= 2; attempt++) {
      try {
        parsed = await callApiOnce(dream, model, controller.signal);
        break;
      } catch (e) {
        if (e instanceof SyntaxError && attempt < 2) {
          await new Promise(r => setTimeout(r, 700));
          continue;
        }
        throw e;
      }
    }

    clearTimeout(timeoutId);
    onModelSuccess(model);

    /* 심볼 정규화 */
    parsed.symbols = (parsed.symbols || []).slice(0, 3).map(s => ({
      emoji: s.emoji || '✨', name: s.name || '상징', meaning: s.meaning || '',
    }));
    while (parsed.symbols.length < 3) parsed.symbols.push({ emoji: '✦', name: '—', meaning: '' });

    incrementDailyCount();
    currentResult = parsed;
    renderResult(parsed);
    showResult();
    startButtonCooldown();

  } catch (err) {
    clearTimeout(timeoutId);
    const status = err.status || 0;
    const msg    = err.name === 'AbortError' ? 'TIMEOUT' : (err.message || '');
    console.error('[ReaDream 오류]', status, msg);

    const model = pickModel();
    const shouldSwitch = status === 404
                      || /no longer available|deprecated|not found/i.test(msg)
                      || (status === 403 && /permission_denied|forbidden/i.test(msg));
    if (shouldSwitch) {
      onModelFail(model);
      const next = pickModel();
      if (next !== model) { isLoading = false; showLoading(false); interpretDream(); return; }
    }

    let userMsg;
    if (status === 401 || /api.?key|invalid.?key|api_key_invalid/i.test(msg))
      userMsg = 'API 키 오류예요. 설정을 확인해주세요 🔑';
    else if (status === 429 || /resource.?exhausted|rate.?limit/i.test(msg))
      userMsg = '해몽 서버가 잠시 바빠요. 1~2분 후 다시 시도해주세요 🌙';
    else if (/network|failed to fetch|load failed|networkerror/i.test(msg))
      userMsg = '인터넷 연결을 확인하고 다시 시도해주세요 📶';
    else if (err.name === 'AbortError' || /timeout/i.test(msg))
      userMsg = '응답 시간이 초과됐어요. 다시 시도해주세요 ⏳';
    else
      userMsg = '해몽 연결에 실패했어요. 잠시 후 다시 시도해주세요 🌙';

    showDreamNotice(userMsg, 'warn');
  } finally {
    isLoading = false;
    showLoading(false);
  }
}

  document.getElementById('loadingSection').classList.toggle('active', on);
  if (on || !cooldownTimer) document.getElementById('interpretBtn').classList.toggle('loading', on);

/* ============================================================
   Canvas 공유 이미지 생성 (1080×1080)
   ============================================================ */
function canvasWrapText(ctx, text, x, y, maxWidth, lineHeight) {
  let line = ''; let lineY = y;
  for (const ch of text) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxWidth && line.length > 0) {
      ctx.fillText(line, x, lineY); line = ch; lineY += lineHeight;
    } else { line = test; }
  }
  if (line) ctx.fillText(line, x, lineY);
  return lineY;
}

function generateShareImage() {
  if (!currentResult) return null;
  const SIZE = 1080;
  const cv   = document.createElement('canvas'); cv.width = cv.height = SIZE;
  const ctx  = cv.getContext('2d');
  const KO   = '"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif';

  /* 배경 */
  const bg = ctx.createLinearGradient(0, 0, SIZE, SIZE);
  bg.addColorStop(0, '#0c0720'); bg.addColorStop(0.5, '#1a0835'); bg.addColorStop(1, '#0c1840');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, SIZE, SIZE);

  /* 별 */
  for (let i = 0; i < 90; i++) {
    const r = Math.random()*2+0.5;
    ctx.beginPath(); ctx.arc(Math.random()*SIZE, Math.random()*SIZE, r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(218,204,255,${(Math.random()*0.5+0.15).toFixed(2)})`; ctx.fill();
  }

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  /* 달 이모지 */
  ctx.font = '88px serif'; ctx.fillText('🌙', SIZE/2, 130);

  /* 앱 이름 */
  const tg = ctx.createLinearGradient(200, 0, 880, 0);
  tg.addColorStop(0, '#fcd34d'); tg.addColorStop(1, '#c4b5fd');
  ctx.fillStyle = tg; ctx.font = `bold 70px ${KO}`; ctx.fillText('ReaDream', SIZE/2, 235);

  /* 부제 */
  ctx.fillStyle = 'rgba(196,181,253,0.65)'; ctx.font = `30px ${KO}`;
  ctx.fillText('꿈이 전하는 내면의 메시지', SIZE/2, 295);

  /* 구분선 */
  const lg = ctx.createLinearGradient(240, 0, 840, 0);
  lg.addColorStop(0, 'transparent'); lg.addColorStop(0.5, '#f59e0b'); lg.addColorStop(1, 'transparent');
  ctx.fillStyle = lg; ctx.fillRect(240, 325, 600, 2);

  /* 상징 3개 */
  const sx = [215, SIZE/2, SIZE-215];
  currentResult.symbols.forEach((s, i) => {
    ctx.font = '65px serif'; ctx.fillText(s.emoji, sx[i], 415);
    ctx.font = `bold 27px ${KO}`; ctx.fillStyle = '#fcd34d'; ctx.fillText(s.name, sx[i], 465);
  });

  /* 해석 */
  const interp = document.getElementById('interpretationText').textContent;
  const iStr   = interp.length > 95 ? interp.slice(0, 95) + '…' : interp;
  ctx.fillStyle = 'rgba(237,224,255,0.88)'; ctx.font = `29px ${KO}`;
  canvasWrapText(ctx, iStr, SIZE/2, 535, 880, 46);

  /* 구분선 하단 */
  ctx.fillStyle = lg; ctx.fillRect(240, 755, 600, 1);

  /* 조언 */
  const advice = document.getElementById('adviceText').textContent;
  const aStr   = advice.length > 58 ? advice.slice(0, 58) + '…' : advice;
  ctx.fillStyle = 'rgba(252,211,77,0.88)'; ctx.font = `italic 25px ${KO}`;
  canvasWrapText(ctx, '✦ ' + aStr, SIZE/2, 795, 840, 38);

  /* URL */
  ctx.fillStyle = 'rgba(196,181,253,0.3)'; ctx.font = `21px ${KO}`;
  ctx.textBaseline = 'alphabetic'; ctx.fillText('dmazone.github.io/readream', SIZE/2, 1052);

  return cv;
}

document.getElementById('btnDownloadImage').addEventListener('click', () => {
  if (!currentResult) { showToast('먼저 해몽하기를 눌러주세요 🌙'); return; }

    const cv = generateShareImage();
    if (!cv) { showToast('이미지 생성에 실패했어요 😥'); return; }

  } catch (e) {

});


/* ============================================================
   공유 기능
   ============================================================ */
let toastTimeout = null;

function showToast(msg) {
  const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show');
  if (toastTimeout) clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => el.classList.remove('show'), 2800);
}

function copyToClipboard(text) {
  if (navigator.clipboard?.writeText) return navigator.clipboard.writeText(text);
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;';
  document.body.appendChild(ta); ta.focus(); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta);
  return Promise.resolve();
}

function buildShareText(forX = false) {
  const dream   = document.getElementById('dreamInput').value.trim();
  const interp  = document.getElementById('interpretationText').textContent;
  const advice  = document.getElementById('adviceText').textContent;
  const symbols = currentResult ? currentResult.symbols.map(s => s.emoji).join(' ') : '';
  const preview = dream.length > 50 ? dream.slice(0, 50) + '…' : dream;
  const url     = 'https://dmazone.github.io/readream/';

  if (forX) {
    const short = interp.length > 70 ? interp.slice(0, 70) + '…' : interp;
    return `🌙 오늘의 꿈 해몽 ${symbols}\n\n"${preview}"\n\n${short}\n\n${url} #ReaDream #꿈해몽`;
  }
  return `🌙 오늘의 꿈 해몽 ${symbols}\n\n"${preview}"\n\n✦ ${interp}\n\n💫 ${advice}\n\n꿈을 해몽해보세요 👉 ${url}`;
}

document.getElementById('btnShareKakao').addEventListener('click', async () => {
  await copyToClipboard(buildShareText());
  showToast('복사됐어요! 카카오톡에 붙여넣기 해주세요 💬');
});

document.getElementById('btnShareX').addEventListener('click', () => {
  const text = buildShareText(true);
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank', 'noopener');
});

document.getElementById('btnShareInsta').addEventListener('click', async () => {
  await copyToClipboard(buildShareText());
  showToast('이미지 저장 후 인스타그램에 올려보세요 📸');
});

document.getElementById('btnShareGeneral').addEventListener('click', async () => {
  const text = buildShareText();
  if (navigator.share) {
    try { await navigator.share({ text }); }
    catch (e) { if (e.name !== 'AbortError') { await copyToClipboard(text); showToast('링크가 복사됐어요 🔗'); } }
  } else { await copyToClipboard(text); showToast('링크가 복사됐어요 🔗'); }
});


/* ============================================================
   꿈 일기 (최대 30개, 5개 미리보기, 클릭 시 상세 확장)
   ============================================================ */
const DIARY_LS  = 'readream_diary';
const DIARY_MAX = 30;
let diaryOpen   = false;

document.getElementById('btnSaveDiary').addEventListener('click', saveDiary);
document.getElementById('diaryToggle').addEventListener('click', toggleDiary);

function getDiaryLocal() {
  try { return JSON.parse(localStorage.getItem(DIARY_LS)) || []; } catch { return []; }
}

async function saveDiary() {
  if (!currentResult) { showToast('먼저 해몽하기를 실행해주세요 🌙'); return; }
  const dream = document.getElementById('dreamInput').value.trim();
  if (!dream) return;

  if (currentUser) {
    const { error } = await sb.from('dream_diary').insert({
      user_id:        currentUser.id,
      dream,
      symbols:        currentResult.symbols,
      interpretation: document.getElementById('interpretationText').textContent,
      advice:         document.getElementById('adviceText').textContent,
    });
    if (error) { showToast('저장 실패. 다시 시도해주세요 😥'); return; }
    showToast('클라우드에 저장됐어요 ☁️🌙');
    await renderDiary();
  } else {
    const diary = getDiaryLocal();
    diary.unshift({
      id:             Date.now(),
      date:           new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'short', day:'numeric', weekday:'short' }),
      dream,
      symbols:        currentResult.symbols,
      interpretation: document.getElementById('interpretationText').textContent,
      advice:         document.getElementById('adviceText').textContent,
    });
    if (diary.length > DIARY_MAX) diary.length = DIARY_MAX;
    localStorage.setItem(DIARY_LS, JSON.stringify(diary));
    showToast('이 기기에 저장됐어요 📖  (로그인 시 클라우드 동기화)');
    await renderDiary();
  }
}

async function deleteDiaryItem(id, isCloud) {
  if (isCloud && currentUser) {
    const { error } = await sb.from('dream_diary').delete().eq('id', id).eq('user_id', currentUser.id);
    if (error) { showToast('삭제 실패 😥'); return; }
  } else {
    const diary = getDiaryLocal();
    const idx   = diary.findIndex(e => String(e.id) === String(id));
    if (idx >= 0) { diary.splice(idx, 1); localStorage.setItem(DIARY_LS, JSON.stringify(diary)); }
  }
  showToast('삭제했어요 🌙');
  await renderDiary();
}

async function renderDiary() {
  let entries = [];

  if (currentUser) {
    const { data, error } = await sb
      .from('dream_diary')
      .select('id, dream, symbols, interpretation, advice, created_at')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: false })
      .limit(DIARY_MAX);
    if (!error && data) {
      entries = data.map(row => ({
        id:             row.id,
        isCloud:        true,
        date:           new Date(row.created_at).toLocaleDateString('ko-KR', { year:'numeric', month:'short', day:'numeric', weekday:'short' }),
        dream:          row.dream,
        symbols:        row.symbols || [],
        interpretation: row.interpretation || '',
        advice:         row.advice || '',
      }));
    }
  } else {
    entries = getDiaryLocal();
  }

  document.getElementById('diaryCount').textContent = entries.length;
  const list = document.getElementById('diaryList');

  if (entries.length === 0) {
    list.innerHTML = '<p class="diary-empty">저장된 꿈 일기가 없습니다.</p>';
    return;
  }

  list.innerHTML = '';
  entries.slice(0, 5).forEach(entry => {
    const isCloud = entry.isCloud || false;

    const item    = document.createElement('div');  item.className    = 'diary-item';
    const top     = document.createElement('div');  top.className     = 'diary-item-top';
    const date    = document.createElement('span'); date.className    = 'diary-date';    date.textContent = '🌙 ' + entry.date;
    const emojis  = document.createElement('span'); emojis.className  = 'diary-emojis'; emojis.textContent = (entry.symbols || []).map(s => s.emoji).join('');
    const preview = document.createElement('div');  preview.className = 'diary-preview'; preview.textContent = entry.dream;

    /* 상세 확장 패널 */
    const detail = document.createElement('div'); detail.className = 'diary-item-detail';
    if (entry.interpretation) {
      const symsRow = document.createElement('div'); symsRow.className = 'diary-detail-symbols';
      (entry.symbols || []).forEach(s => {
        const sym = document.createElement('div');  sym.className = 'diary-detail-sym';
        const em  = document.createElement('span'); em.className  = 'd-emoji'; em.textContent = s.emoji;
        const nm  = document.createElement('span'); nm.className  = 'd-name';  nm.textContent = s.name;
        sym.append(em, nm); symsRow.appendChild(sym);
      });
      const interp = document.createElement('div'); interp.className = 'diary-detail-interp'; interp.textContent = entry.interpretation;
      const adv    = document.createElement('div'); adv.className    = 'diary-detail-advice'; adv.textContent    = '✦ ' + entry.advice;
      detail.append(symsRow, interp, adv);
    }

    /* 삭제 버튼 */
    const delBtn = document.createElement('button'); delBtn.className = 'diary-item-delete'; delBtn.textContent = '✕'; delBtn.title = '삭제';
    delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteDiaryItem(entry.id, isCloud); });

    top.append(date, emojis);
    item.append(top, preview, detail, delBtn);
    item.addEventListener('click', () => detail.classList.toggle('open'));
    list.appendChild(item);
  });
}

function toggleDiary() {
  diaryOpen = !diaryOpen;
  document.getElementById('diaryList').classList.toggle('open', diaryOpen);
  document.getElementById('diaryChevron').classList.toggle('open', diaryOpen);
}


/* ============================================================
   초기화
   ============================================================ */
(async function init() {
  const { data: { session } } = await sb.auth.getSession();
  currentUser = session?.user ?? null;
  updateUserUI();
  updateUsageUI();
  await renderDiary();
})();
